# Copy to researchforge.yaml, review, then `researchforge contract approve`.
version: 1
project:
  name: docker-python
  mode: improve_repository
objective:
  description: "Improve sentiment classification F1 without exceeding the latency budget"
  primary_metric:
    name: f1
    direction: maximize
  hard_constraints:
    - name: p95_latency_ms
      operator: "<="
      value: 200
  secondary_metrics:
    - p95_latency_ms
repository:
  baseline_ref: main
execution:
  mode: docker
  trusted_repository: true
  setup_command: null
  screening_command: "python benchmarks/evaluate.py --quick"
  full_command: "python benchmarks/evaluate.py"
  result_file: artifacts/results.json
  timeout_minutes: 5
  cpu_limit: 1
  memory_mb: 1024
  max_experiments: 6
permissions:
  editable_paths:
    - src/
  protected_paths:
    - benchmarks/
network:
  mode: none
secrets:
  forward_environment_variables: []
validation:
  repeat_finalists: 2
  require_existing_tests: false
shipping:
  allow_branch_creation: true
  allow_draft_pr: false
